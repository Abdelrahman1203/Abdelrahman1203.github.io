version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_DATABASE=app
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - MONGODB_URI=mongodb://mongo:27017/app
      - REDIS_HOST=redis
    depends_on:
      - mysql
      - mongo
      - redis
    volumes:
      - .:/var/www/html

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: app
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/blackhorse
      - JWT_SECRET=local-dev-secret
    depends_on:
      - mongo

volumes:
  mysql_data:
  mongo_data:
